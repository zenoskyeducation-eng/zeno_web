<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" fill="none">
  <!-- Brand Name: ZENO-SKY -->
  <g fill="#FFFFFF" font-family="'Inter', 'Montserrat', 'Arial Black', sans-serif" font-weight="900">
    <!-- ZEN -->
    <text x="10" y="95" font-size="78" letter-spacing="2">ZEN</text>
    
    <!-- Orbital Symbol 'O' -->
    <g transform="translate(195, 58)">
      <!-- Outer Orbit Ring -->
      <ellipse cx="40" cy="32" rx="42" ry="18" fill="none" stroke="#FFFFFF" stroke-width="7" transform="rotate(-30, 40, 32)" />
      <!-- Outer Planet Ring -->
      <circle cx="40" cy="32" r="28" fill="#000000" stroke="#FFFFFF" stroke-width="7" />
      <!-- Inner Core Ring -->
      <circle cx="40" cy="32" r="14" fill="#000000" stroke="#FFFFFF" stroke-width="6" />
      <!-- Core Point -->
      <circle cx="40" cy="32" r="5" fill="#FFFFFF" />
    </g>

    <!-- -SKY -->
    <text x="290" y="95" font-size="78" letter-spacing="2">-SKY</text>
  </g>

  <!-- Tagline: AEROSPACE & DEFENCE -->
  <text x="260" y="148" text-anchor="middle" fill="#FFFFFF" font-family="'Inter', 'Roboto', sans-serif" font-weight="600" font-size="32" letter-spacing="8">AEROSPACE &amp; DEFENCE</text>
</svg>
